<!DOCTYPE html>
<html>
<head>
  <title>Phone Store</title>
</head>
<body>

  <h2>Phone Number Save App</h2>

  <input type="text" id="number" placeholder="Enter phone number">
  <button onclick="saveNumber()">Save</button>

  <p id="msg"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyD8k99mMtdNzwGdrvIfIKkwA4QNvffgIwY",
      authDomain: "masani-9c812.firebaseapp.com",
      projectId: "masani-9c812",
      storageBucket: "masani-9c812.firebasestorage.app",
      messagingSenderId: "24662118212",
      appId: "1:24662118212:web:cf110fcc380a8797e85111"
    };

    // Init Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Function to save number
    window.saveNumber = async function () {
      const number = document.getElementById("number").value;

      if (!number) {
        document.getElementById("msg").innerText = "Number enter karo!";
        return;
      }

      try {
        await addDoc(collection(db, "numbers"), {
          phone: number,
          time: new Date()
        });

        document.getElementById("msg").innerText = "Number saved ✅";
        document.getElementById("number").value = "";

      } catch (e) {
        document.getElementById("msg").innerText = "Error ❌";
        console.log(e);
      }
    }
  </script>

</body>
</html>
