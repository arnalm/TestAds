<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAUDC9wwxb1PaqLLsgrBCxejzGI2MO0IrI",
  authDomain: "logi-app-b40b4.firebaseapp.com",
  projectId: "logi-app-b40b4",
  storageBucket: "logi-app-b40b4.firebasestorage.app",
  messagingSenderId: "14326388492",
  appId: "1:14326388492:web:1235ee58e09669c90e5b29",
  measurementId: "G-HTY1SLTNXJ"
};

// Init Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const analytics = getAnalytics(app);

// SIGNUP
window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Signup successful!");
    })
    /*.catch((error) => {
      alert(error.message);
      console.log(error.code);
    });*/
};

// LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Login successful!");
    })
   /* .catch((error) => {
      alert(error.message);
     console.log(error.code);
    });*/
};

// LOGOUT
window.logout = function () {
  signOut(auth);
  
  
  
};

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  const status = document.getElementById("status");

  if (user) {
    status.innerText = "Logged in: " + user.email;
  } else {
    status.innerText = "Not logged in";
  }
});










</script>
