<html lang="en">
<head>

    body{
      text-align: center;

<body>

<input type="text" id="name" placeholder="Name"><br><br>
<input type="text" id="number" placeholder="Number"><br><br>
<button id="sendBtn">Send</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL0TdZ-99-2z2TxJAcC8IarMe_CwgpB9Q",
  authDomain: "enternu-8ea16.firebaseapp.com",
  projectId: "enternu-8ea16",
  storageBucket: "enternu-8ea16.firebasestorage.app",
  messagingSenderId: "154759454207",
  appId: "1:154759454207:web:51442b35d31da1a46b1bca",
  measurementId: "G-QP1VHL75EM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.onload = () => {
  document.getElementById("sendBtn").onclick = async () => {
    
    
    
    
 const name = document.getElementById("name").value;
    const number = document.getElementById("number").value;

 try {
      await addDoc(collection(db, "user"), { name, number });
    
    } catch (err) {
      console.error(err);
      
    }
  };
};
</script>

</body>
